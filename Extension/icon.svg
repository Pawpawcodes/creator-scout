<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="64" cy="64" r="64" fill="url(#grad)"/>

  <!-- Left binocular -->
  <circle cx="40" cy="50" r="16" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="40" cy="50" r="12" fill="rgba(255,255,255,0.15)"/>

  <!-- Right binocular -->
  <circle cx="88" cy="50" r="16" fill="none" stroke="white" stroke-width="2.5"/>
  <circle cx="88" cy="50" r="12" fill="rgba(255,255,255,0.15)"/>

  <!-- Bridge -->
